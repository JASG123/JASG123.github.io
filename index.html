<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>暗影詩章牌組管理工具</title>
  
  <style>
    /* 全局樣式 */
    body {
      margin: 0;
      padding-top: 60px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #12161a;
      color: #e0e6ed;
      -webkit-tap-highlight-color: transparent;
    }

    /* ==========================================
       1. 永遠置頂的導覽列
       ========================================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #1a222d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #8fa0b3;
      font-size: 16px;
      font-weight: bold;
      padding: 10px 5px;
      cursor: pointer;
      width: 33.33%;
      height: 100%;
      transition: all 0.2s ease;
      border-bottom: 3px solid transparent;
    }

    .nav-btn.active {
      color: #ffcc00;
      border-bottom: 3px solid #ffcc00;
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* ==========================================
       2. 下方內容區塊容器
       ========================================== */
    .content-container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .page-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .page-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================
       3. 【重要】查看牌組：互動圖片樣式
       ========================================== */
    /* 容器：設定相對定位，好讓內部的點擊熱點以此為基準進行絕對定位 */
    .interactive-image-container {
      position: relative;
      width: 100%;
      max-width: 1024px; /* 防止電腦版過大 */
      margin: 20px auto;
      background-color: #000; /* 圖片載入前的底色 */
      border: 1px solid #34445c;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* 牌組截圖本身，寬度自適應 */
    .deck-image-bg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 透明的點擊熱點基本樣式 */
    .hotspot {
      position: absolute;
      border-radius: 4px;
      cursor: pointer;
      box-sizing: border-box;
      /* 開發期間可以將 border 打開，用來對齊位置 */
      /* border: 2px solid rgba(255, 215, 0, 0.6); */
      transition: all 0.2s;
    }

    /* 電腦版滑鼠滑過、手機版點擊時的效果：發光外框 */
    .hotspot:hover {
      box-shadow: 0 0 15px rgba(255, 204, 0, 1), 
                  inset 0 0 10px rgba(255, 204, 0, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }

    /* =========================================================
       利用百分比 (%) 來精準定位每張卡牌的位置 (以截圖 1024x512 換算)
       ========================================================= */
    
    /* 第一排左一：安息の粛清 (2PP) */
    .card-1-1 {
      top: 38%;     /* 距離頂部約 38% */
      left: 1.1%;   /* 距離左側約 1.1% */
      width: 8.6%;  /* 寬度佔全圖的 8.6% */
      height: 40%;  /* 高度佔全圖的 40% */
    }

    /* ==========================================
       4. 新增牌組：匯入區塊樣式 (保留之前的功能)
       ========================================== */
    .import-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .import-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px;
    }

    .import-input {
      flex: 1;
      background-color: #1a222d;
      border: 1px solid #34445c;
      color: #fff;
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .import-input:focus {
      border-color: #ffcc00;
    }

    .import-btn {
      background-color: #ffcc00;
      color: #12161a;
      border: none;
      padding: 0 20px;
      font-weight: bold;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .card-item {
      background: #1c2430;
      border: 1px solid #2d3b4f;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-cost {
      background: #2563eb;
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .card-name {
      font-size: 14px;
      flex: 1;
      margin-left: 12px;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-count {
      color: #ffcc00;
      font-weight: bold;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <button class="nav-btn active" onclick="switchPage('view-page', this)">查看牌組</button>
    <button class="nav-btn" onclick="switchPage('add-page', this)">新增牌組</button>
    <button class="nav-btn" onclick="switchPage('edit-page', this)">編輯牌組</button>
  </nav>

  <main class="content-container">
    
    <section id="view-page" class="page-section active">
      <h2>👁️ 查看牌組 (主教)</h2>
      
      <div class="interactive-image-container">
        <img src="deck_image.png" alt="主教牌組截圖" class="deck-image-bg">

        <div class="hotspot card-1-1" title="安息の粛清" onclick="showCardInfo('安息の粛清', '【2PP】核心解場牌。前期可以用來處理對方的威脅，提供穩定的控制能力。')"></div>
        
        </div>
    </section>

    <section id="add-page" class="page-section">
      <h2>➕ 新增牌組</h2>
      <div class="import-wrapper">
        <div class="import-bar">
          <input type="text" id="deck-url" class="import-input" placeholder="貼上 shadowverse-wb.com 牌組連結...">
          <button class="import-btn" onclick="importDeckData()">データ匯入</button>
        </div>
        <div id="card-grid-container" class="card-grid"></div>
      </div>
    </section>

    <section id="edit-page" class="page-section">
      <h2>✏️ 編輯牌組</h2>
      <div class="card-placeholder">
        <p>【這裡是編輯頁面】</p>
      </div>
    </section>

  </main>

  <script>
    function switchPage(pageId, clickedButton) {
      document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(button => button.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      clickedButton.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 當點擊卡牌熱點時觸發的函數
    function showCardInfo(cardName, infoText) {
      // 在電腦版，滑鼠移過去會有外框特效
      // 在手機版，點擊會跳出這個警示窗（日後可以改成更精美的畫面彈窗）
      alert(cardName + "\n\n" + infoText);
    }

    // 保留之前的匯入功能
    function importDeckData() {
      // (這裡的程式碼與上一步完全相同，已略過以保持簡潔)
      // 成功匯入Mock數據後...
      alert('成功匯入 Mock 數據！');
    }
  </script>

</body>
</html>
