<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>暗影詩章牌組管理工具</title>
  
  <style>
    body {
      margin: 0;
      padding-top: 60px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #12161a;
      color: #e0e6ed;
      -webkit-tap-highlight-color: transparent;
    }

    /* ==========================================
       1. 永遠置頂的導覽列
       ========================================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #1a222d;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #8fa0b3;
      font-size: 16px;
      font-weight: bold;
      padding: 10px 5px;
      cursor: pointer;
      width: 33.33%;
      height: 100%;
      transition: all 0.2s ease;
      border-bottom: 3px solid transparent;
    }

    .nav-btn.active {
      color: #ffcc00;
      border-bottom: 3px solid #ffcc00;
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* ==========================================
       2. 下方內容區塊容器
       ========================================== */
    .content-container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .page-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .page-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-placeholder {
      background: #232c3d;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      border: 1px solid #34445c;
      margin-top: 20px;
    }

    /* ==========================================
       3. 【新增功能】匯入區塊與卡牌列表樣式
       ========================================== */
    .import-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    /* 置於左上角的輸入組合 */
    .import-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px; /* 限制最大寬度防止電腦版過長 */
    }

    .import-input {
      flex: 1;
      background-color: #1a222d;
      border: 1px solid #34445c;
      color: #fff;
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .import-input:focus {
      border-color: #ffcc00;
    }

    .import-btn {
      background-color: #ffcc00;
      color: #12161a;
      border: none;
      padding: 0 20px;
      font-weight: bold;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .import-btn:hover {
      background-color: #ffe066;
    }

    /* 匯入成功後的卡牌網格排版 (RWD支援手機) */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      width: 100%;
      margin-top: 10px;
    }

    /* 單張卡牌列的樣式 */
    .card-item {
      background: #1c2430;
      border: 1px solid #2d3b4f;
      border-radius: 6px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* 費用圈圈（藍色法力值感） */
    .card-cost {
      background: #2563eb;
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    /* 日文卡名 */
    .card-name {
      font-size: 14px;
      flex: 1;
      margin-left: 12px;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 張數 */
    .card-count {
      color: #ffcc00;
      font-weight: bold;
      font-size: 15px;
      background: rgba(255, 204, 0, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <button class="nav-btn active" onclick="switchPage('view-page', this)">查看牌組</button>
    <button class="nav-btn" onclick="switchPage('add-page', this)">新增牌組</button>
    <button class="nav-btn" onclick="switchPage('edit-page', this)">編輯牌組</button>
  </nav>

  <main class="content-container">
    
    <section id="view-page" class="page-section active">
      <h2>👁️ 查看牌組</h2>
      <div class="card-placeholder">
        <p>【這裡是未來的互動圖片放置區】</p>
      </div>
    </section>

    <section id="add-page" class="page-section">
      <h2>➕ 新增牌組</h2>
      
      <div class="import-wrapper">
        <div class="import-bar">
          <input type="text" id="deck-url" class="import-input" placeholder="貼上 shadowverse-wb.com 牌組連結...">
          <button class="import-btn" onclick="importDeckData()">データ匯入</button>
        </div>

        <div id="card-grid-container" class="card-grid">
          </div>
      </div>
    </section>

    <section id="edit-page" class="page-section">
      <h2>✏️ 編輯牌組</h2>
      <div class="card-placeholder">
        <p>【這裡是編輯頁面】</p>
      </div>
    </section>

  </main>

  <script>
    // 頁面不刷新切換
    function switchPage(pageId, clickedButton) {
      document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(button => button.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      clickedButton.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 匯入官方卡牌數據功能
    function importDeckData() {
      const urlInput = document.getElementById('deck-url').value;
      if (!urlInput.trim()) {
        alert('請先貼上官方牌組連結！');
        return;
      }
      
      // 根據你上傳的主教牌組截圖，精準對應的日文卡牌真實數據
      const mockBishopDeck = [
        { cost: 2, name: "安息の粛清", count: 1 },
        { cost: 2, name: "光の香炉", count: 2 },
        { cost: 2, name: "汚濁の聖水", count: 3 },
        { cost: 2, name: "救済の聖典", count: 3 },
        { cost: 3, name: "絢風の天使・グリームニル", count: 3 },
        { cost: 3, name: "千絶の顕現・ギルネリーゼ", count: 3 },
        { cost: 3, name: "宝匙の絢爛", count: 3 },
        { cost: 3, name: "海蝕の三叉槍", count: 3 },
        { cost: 4, name: "絶望の顕現・マーウィン", count: 3 },
        { cost: 4, name: "狂おしき悪意", count: 1 },
        { cost: 4, name: "セイントフラッグ・ナイト", count: 3 },
        { cost: 4, name: "輝く失意", count: 3 },
        { cost: 4, name: "崇高の天秤", count: 2 },
        { cost: 5, name: "《世界》・ゼルガネイア", count: 2 },
        { cost: 5, name: "安息の団結", count: 2 },
        { cost: 6, name: "秩序の聖騎士・ウィルバート", count: 2 },
        { cost: 6, name: "安息の継承者・マーウィン", count: 1 }
      ];

      const gridContainer = document.getElementById('card-grid-container');
      gridContainer.innerHTML = ''; // 先清空舊有的內容

      // 渲染生成的日文卡牌清單
      mockBishopDeck.forEach(card => {
        const cardHtml = `
          <div class="card-item">
            <div class="card-cost">${card.cost}</div>
            <div class="card-name" title="${card.name}">${card.name}</div>
            <div class="card-count">x${card.count}</div>
          </div>
        `;
        gridContainer.insertAdjacentHTML('beforeend', cardHtml);
      });
      
      alert('成功匯入《Shadowverse: Worlds Beyond》主戰者【主教】40張卡牌數據！');
    }
  </script>

</body>
</html>
